name: Fetch Datos Monitor Macro

on:
  schedule:
    - cron: '0 15 * * 1-5'   # 12:00 ART (UTC-3)
    - cron: '0 22 * * 1-5'   # 19:00 ART (UTC-3)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests pandas yfinance openpyxl

      - name: Ejecutar fetch BCRA
        run: python data/fetch_data.py

      - name: Ejecutar fetch Mercados
        run: python data/fetch_mercados.py

      - name: Ejecutar fetch Dolar
        run: python data/fetch_dolar.py

      - name: Ejecutar fetch Actividad & Fiscal
        run: python data/fetch_actividad.py

      - name: Ejecutar fetch Macro Global
        run: python data/fetch_macro_global.py
        continue-on-error: true

      - name: Ejecutar fetch Calendario
        run: python data/fetch_calendario.py
        continue-on-error: true

      - name: Ejecutar fetch Earnings
        run: python data/fetch_earnings.py
        continue-on-error: true

      - name: Ejecutar fetch Bonos Soberanos
        run: python data/fetch_bonos.py
        continue-on-error: true

      - name: Ejecutar fetch Premarket
        run: python data/fetch_premarket.py
        continue-on-error: true

      - name: Commit y push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/ || true
          git commit -m "datos $(date +'%Y-%m-%d')" || echo "sin cambios"
          git push || echo "nada que pushear"
