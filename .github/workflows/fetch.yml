name: Fetch BCRA Data
 
on:
  schedule:
    - cron: '0 12 * * 1-5'
  workflow_dispatch:
 
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Instalar dependencias
        run: pip install requests pandas yfinance
 
      - name: Ejecutar fetch BCRA
        run: python data/fetch_data.py
 
      - name: Ejecutar fetch Mercados
        run: python data/fetch_mercados.py
 
      - name: Ejecutar fetch Dolar
        run: python data/fetch_dolar.py
 
      - name: Commit y push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/bcra_data.csv data/mercados_data.csv data/dolar_data.csv data/itcrm_data.csv data/riesgo_pais_data.csv
          git commit -m "datos $(date +'%Y-%m-%d')" || echo "sin cambios"
          git push
 
 
