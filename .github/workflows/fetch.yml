name: Fetch Datos Monitor Macro

on:
  schedule:
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests pandas yfinance openpyxl

      - name: Ejecutar fetch BCRA
        run: python data/fetch_data.py

      - name: Ejecutar fetch Mercados
        run: python data/fetch_mercados.py

      - name: Ejecutar fetch Dolar
        run: python data/fetch_dolar.py

      - name: Ejecutar fetch Actividad & Fiscal
        run: python data/fetch_actividad.py

      - name: Ejecutar fetch Bonos Soberanos
        run: python data/fetch_bonos.py

      - name: Commit y push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/bcra_data.csv data/mercados_data.csv data/dolar_data.csv data/itcrm_data.csv data/riesgo_pais_data.csv data/actividad_data.csv data/bonos_data.csv
          git commit -m "datos $(date +'%Y-%m-%d')" || echo "sin cambios"
          git push
