name: Actualizar datos BCRA

on:
  schedule:
    - cron: '0 12 * * 1-5'  # Lunes a viernes a las 9hs Argentina
  workflow_dispatch:          # Permite correrlo manualmente con un botón

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests pandas

      - name: Correr script de datos
        run: python data/fetch_data.py

      - name: Guardar datos en el repositorio
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/bcra_data.csv
          git commit -m "Actualización automática de datos $(date +'%Y-%m-%d')" || echo "Sin cambios"
          git push
